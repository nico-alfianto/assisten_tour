<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register - Assisten Tour</title>

    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>

        body{

            background:url("assets/img/banner3.jpg") center center/cover no-repeat fixed;

            display:flex;

            justify-content:center;

            align-items:center;

            min-height:100vh;

        }

        .bg-overlay{

            position:fixed;

            inset:0;

            background:rgba(0,0,0,.55);

        }

        .register-card{

            position:relative;

            z-index:2;

            width:90%;

            max-width:450px;

            background:white;

            padding:35px;

            border-radius:20px;

            box-shadow:0 20px 50px rgba(0,0,0,.25);

            animation:fadeUp .8s;

        }

        .register-card h2{

            text-align:center;

            color:#0ea5e9;

            margin-bottom:10px;

        }

        .register-card p{

            text-align:center;

            color:#666;

            margin-bottom:25px;

            font-size:14px;

        }

        .form-group{

            margin-bottom:18px;

        }

        .form-group label{

            display:block;

            margin-bottom:8px;

            font-weight:600;

        }

        .form-group input{

            width:100%;

            padding:14px;

            border:1px solid #ddd;

            border-radius:10px;

            outline:none;

            transition:.3s;

        }

        .form-group input:focus{

            border-color:#0ea5e9;

        }

        .register-btn{

            width:100%;

            background:#0ea5e9;

            color:white;

            border:none;

            padding:15px;

            border-radius:10px;

            font-size:16px;

            cursor:pointer;

            transition:.3s;

        }

        .register-btn:hover{

            background:#0284c7;

        }

        .bottom-link{

            margin-top:20px;

            text-align:center;

            font-size:14px;

        }

        .bottom-link a{

            color:#0ea5e9;

            text-decoration:none;

            font-weight:600;

        }

        .back-home{

            display:block;

            margin-top:20px;

            text-align:center;

            text-decoration:none;

            color:#555;

        }

    </style>

</head>

<body>

<div class="bg-overlay"></div>

<div class="register-card">

<h2>Create Account ✨</h2>

<p>Buat akun baru untuk mulai menjelajahi Indonesia.</p>

<form id="registerForm">

<div class="form-group">

<label>Nama Lengkap</label>

<input
type="text"
id="name"
placeholder="Masukkan nama lengkap">

</div>

<div class="form-group">

<label>Email</label>

<input
type="email"
id="email"
placeholder="Masukkan email">

</div>

<div class="form-group">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Masukkan password">

</div>

<div class="form-group">

<label>Konfirmasi Password</label>

<input
type="password"
id="confirm"
placeholder="Ulangi password">

</div>

<button
type="submit"
class="register-btn">

Daftar

</button>

</form>

<div class="bottom-link">

Sudah punya akun?

<a href="login.html">

Login

</a>

</div>

<a
href="index.html"
class="back-home">

← Kembali ke Beranda

</a>

</div>

<script>

document.getElementById("registerForm").addEventListener("submit",function(e){

e.preventDefault();

let name=document.getElementById("name").value.trim();

let email=document.getElementById("email").value.trim();

let password=document.getElementById("password").value;

let confirm=document.getElementById("confirm").value;

if(name===""||email===""||password===""||confirm===""){

alert("Semua data wajib diisi.");

return;

}

if(password.length<6){

alert("Password minimal 6 karakter.");

return;

}

if(password!==confirm){

alert("Konfirmasi password tidak sama.");

return;

}

alert("Registrasi berhasil! (Demo Mode)");

window.location.href="home.html";

});

</script>

</body>

</html>
