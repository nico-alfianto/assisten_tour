<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Assisten Tour</title>

    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>

        body{

            background:url("assets/img/banner2.jpg") center center/cover no-repeat fixed;

            display:flex;

            justify-content:center;

            align-items:center;

            min-height:100vh;

        }

        .bg-overlay{

            position:fixed;

            inset:0;

            background:rgba(0,0,0,.55);

        }

        .login-card{

            position:relative;

            z-index:2;

            width:90%;

            max-width:420px;

            background:white;

            padding:35px;

            border-radius:20px;

            box-shadow:0 20px 50px rgba(0,0,0,.25);

            animation:fadeUp .8s;

        }

        .login-card h2{

            text-align:center;

            color:#0ea5e9;

            margin-bottom:10px;

        }

        .login-card p{

            text-align:center;

            color:#666;

            margin-bottom:25px;

            font-size:14px;

        }

        .form-group{

            margin-bottom:18px;

        }

        .form-group label{

            display:block;

            margin-bottom:8px;

            font-weight:600;

        }

        .form-group input{

            width:100%;

            padding:14px;

            border:1px solid #ddd;

            border-radius:10px;

            outline:none;

            transition:.3s;

        }

        .form-group input:focus{

            border-color:#0ea5e9;

        }

        .login-btn{

            width:100%;

            background:#0ea5e9;

            color:white;

            border:none;

            padding:15px;

            border-radius:10px;

            font-size:16px;

            cursor:pointer;

            transition:.3s;

        }

        .login-btn:hover{

            background:#0284c7;

        }

        .bottom-link{

            margin-top:20px;

            text-align:center;

            font-size:14px;

        }

        .bottom-link a{

            color:#0ea5e9;

            text-decoration:none;

            font-weight:600;

        }

        .back-home{

            display:block;

            margin-top:20px;

            text-align:center;

            text-decoration:none;

            color:#555;

        }

    </style>

</head>

<body>

<div class="bg-overlay"></div>

<div class="login-card">

<h2>Welcome Back 👋</h2>

<p>Login untuk melanjutkan perjalananmu.</p>

<form id="loginForm">

<div class="form-group">

<label>Email</label>

<input type="email" id="email" placeholder="Masukkan email">

</div>

<div class="form-group">

<label>Password</label>

<input type="password" id="password" placeholder="Masukkan password">

</div>

<button class="login-btn" type="submit">

Login

</button>

</form>

<div class="bottom-link">

Belum punya akun?

<a href="register.html">

Daftar

</a>

</div>

<a href="index.html" class="back-home">

← Kembali ke Beranda

</a>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

let email=document.getElementById("email").value;

let password=document.getElementById("password").value;

if(email===""||password===""){

alert("Silakan isi email dan password.");

return;

}

alert("Login berhasil (Demo Mode)");

window.location.href="home.html";

});

</script>

</body>

</html>
