<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Destination Detail | Assisten Tour</title>

<link rel="stylesheet" href="assets/css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

body{

background:#f5f7fb;

padding-bottom:90px;

}

.hero-image{

width:100%;

height:320px;

overflow:hidden;

position:relative;

}

.hero-image img{

width:100%;

height:100%;

object-fit:cover;

}

.back-btn{

position:absolute;

top:20px;

left:20px;

width:45px;

height:45px;

background:white;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

text-decoration:none;

color:#0ea5e9;

font-size:20px;

box-shadow:0 5px 15px rgba(0,0,0,.2);

}

.content{

max-width:900px;

margin:auto;

padding:25px;

}

.title{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:15px;

}

.title h1{

font-size:30px;

}

.favorite{

background:#ff4d6d;

color:white;

border:none;

width:50px;

height:50px;

border-radius:50%;

font-size:22px;

cursor:pointer;

}

.info{

display:flex;

gap:20px;

flex-wrap:wrap;

margin-bottom:20px;

color:#666;

}

.description{

line-height:1.9;

color:#555;

margin-bottom:30px;

}

.gallery{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

gap:15px;

}

.gallery img{

width:100%;

height:150px;

object-fit:cover;

border-radius:15px;

transition:.3s;

cursor:pointer;

}

.gallery img:hover{

transform:scale(1.05);

}

.bottom-nav{

position:fixed;

bottom:0;

left:0;

width:100%;

display:flex;

justify-content:space-around;

background:white;

padding:15px 0;

box-shadow:0 -5px 20px rgba(0,0,0,.1);

}

.bottom-nav a{

text-decoration:none;

color:#777;

display:flex;

flex-direction:column;

align-items:center;

font-size:13px;

}

.bottom-nav a.active{

color:#0ea5e9;

}

.bottom-nav i{

font-size:22px;

margin-bottom:5px;

}

</style>

</head>

<body>

<div class="hero-image">

<img src="assets/img/bali.jpg" id="heroImage">

<a href="home.html" class="back-btn">

<i class="fa-solid fa-arrow-left"></i>

</a>

</div>

<div class="content">

<div class="title">

<h1 id="title">

Bali

</h1>

<button class="favorite" id="favBtn">

❤

</button>

</div>

<div class="info">

<div>

📍 <span id="location">Bali</span>

</div>

<div>

⭐ <span id="rating">4.9</span>

</div>

</div>

<p class="description" id="description">

Bali merupakan salah satu destinasi wisata paling terkenal di Indonesia.
Pulau ini menawarkan keindahan pantai, budaya yang kaya, kuliner khas,
serta berbagai tempat wisata yang menarik untuk dikunjungi bersama keluarga
maupun teman.

</p>

<h2>Gallery</h2>

<br>

<div class="gallery">

<img src="assets/img/banner1.jpg">

<img src="assets/img/banner2.jpg">

<img src="assets/img/banner3.jpg">

<img src="assets/img/bali.jpg">

</div>

</div>

<nav class="bottom-nav">

<a href="home.html" class="active">

<i class="fa-solid fa-house"></i>

<span>Home</span>

</a>

<a href="favorite.html">

<i class="fa-solid fa-heart"></i>

<span>Favorite</span>

</a>

<a href="profile.html">

<i class="fa-solid fa-user"></i>

<span>Profile</span>

</a>

<a href="about.html">

<i class="fa-solid fa-circle-info"></i>

<span>About</span>

</a>

</nav>

<script>

const data={

bali:{
title:"Bali",
image:"assets/img/bali.jpg",
location:"Bali",
rating:"4.9",
description:"Bali terkenal dengan pantai, budaya, pura, sunset, dan keramahan masyarakatnya."
},

bromo:{
title:"Gunung Bromo",
image:"assets/img/bromo.jpg",
location:"Jawa Timur",
rating:"4.8",
description:"Gunung Bromo menawarkan pemandangan matahari terbit yang menjadi favorit wisatawan."
},

borobudur:{
title:"Candi Borobudur",
image:"assets/img/borobudur.png",
location:"Jawa Tengah",
rating:"4.8",
description:"Borobudur merupakan candi Buddha terbesar di dunia dan warisan budaya UNESCO."
},

raja_ampat:{
title:"Raja Ampat",
image:"assets/img/raja_ampat.png",
location:"Papua Barat",
rating:"5.0",
description:"Raja Ampat dikenal sebagai salah satu surga bawah laut terbaik di dunia."
}

};

const params=new URLSearchParams(window.location.search);

const id=params.get("id");

if(data[id]){

document.getElementById("title").innerHTML=data[id].title;

document.getElementById("heroImage").src=data[id].image;

document.getElementById("location").innerHTML=data[id].location;

document.getElementById("rating").innerHTML=data[id].rating;

document.getElementById("description").innerHTML=data[id].description;

}

const fav=document.getElementById("favBtn");

fav.onclick=function(){

let favorites=JSON.parse(localStorage.getItem("favorites"))||[];

if(!favorites.find(item=>item.id===id)){

favorites.push({

id:id,

title:data[id].title,

image:data[id].image,

location:data[id].location

});

localStorage.setItem("favorites",JSON.stringify(favorites));

alert("Berhasil ditambahkan ke Favorite ❤️");

}else{

alert("Destinasi sudah ada di Favorite.");

}

};

</script>

</body>

</html>
