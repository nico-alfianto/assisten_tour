<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Favorite | Assisten Tour</title>

<link rel="stylesheet" href="assets/css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

body{

background:#f5f7fb;

padding-bottom:90px;

font-family:'Poppins',sans-serif;

}

header{

background:linear-gradient(135deg,#0ea5e9,#2563eb);

color:white;

padding:25px;

text-align:center;

border-bottom-left-radius:25px;

border-bottom-right-radius:25px;

}

.container{

padding:20px;

max-width:1100px;

margin:auto;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:20px;

}

.card{

background:white;

border-radius:18px;

overflow:hidden;

box-shadow:0 10px 20px rgba(0,0,0,.08);

}

.card img{

width:100%;

height:180px;

object-fit:cover;

}

.card-content{

padding:15px;

}

.card-content h3{

margin-bottom:8px;

}

.card-content p{

color:#666;

margin-bottom:15px;

}

.btn{

display:inline-block;

background:#0ea5e9;

color:white;

padding:10px 18px;

border-radius:8px;

text-decoration:none;

}

.empty{

text-align:center;

padding:80px 20px;

color:#777;

}

.bottom-nav{

position:fixed;

bottom:0;

left:0;

width:100%;

display:flex;

justify-content:space-around;

background:white;

padding:15px 0;

box-shadow:0 -5px 20px rgba(0,0,0,.1);

}

.bottom-nav a{

display:flex;

flex-direction:column;

align-items:center;

text-decoration:none;

color:#777;

font-size:13px;

}

.bottom-nav a.active{

color:#0ea5e9;

}

.bottom-nav i{

font-size:22px;

margin-bottom:5px;

}

</style>

</head>

<body>

<header>

<h2>❤️ Favorite Destinations</h2>

<p>Daftar destinasi favoritmu</p>

</header>

<div class="container">

<div id="favoriteList" class="grid"></div>

</div>

<nav class="bottom-nav">

<a href="home.html">

<i class="fa-solid fa-house"></i>

<span>Home</span>

</a>

<a href="favorite.html" class="active">

<i class="fa-solid fa-heart"></i>

<span>Favorite</span>

</a>

<a href="profile.html">

<i class="fa-solid fa-user"></i>

<span>Profile</span>

</a>

<a href="about.html">

<i class="fa-solid fa-circle-info"></i>

<span>About</span>

</a>

</nav>

<script>

const container=document.getElementById("favoriteList");

let favorites=JSON.parse(localStorage.getItem("favorites"))||[];

if(favorites.length===0){

container.innerHTML=`
<div class="empty">

<h2>Belum Ada Favorite 😢</h2>

<p>Tambahkan destinasi favorit dari halaman Detail.</p>

</div>
`;

}else{

favorites.forEach(item=>{

container.innerHTML+=`

<div class="card">

<img src="${item.image}">

<div class="card-content">

<h3>${item.title}</h3>

<p>📍 ${item.location}</p>

<a href="detail.html?id=${item.id}" class="btn">

Lihat Detail

</a>

</div>

</div>

`;

});

}

</script>

</body>

</html>
